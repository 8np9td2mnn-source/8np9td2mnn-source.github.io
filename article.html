<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="site-name">你的名字</h1>
      <p class="site-desc">记录想法、生活与成长。<br>慢写，写给自己看。</p>
      <nav class="nav">
        <a href="./index.html">文章</a>
        <a href="./about.html">关于</a>
      </nav>
      <p class="sidebar-foot">© 2026</p>
    </aside>

    <main class="main">
      <a href="./index.html" class="back-link">← 返回文章列表</a>
      <article id="article">
        <p class="empty">加载中…</p>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="./blog-store.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    const container = document.getElementById("article");

    loadPosts()
      .then((posts) => {
        const post = findPost(posts, slug);
        if (!post) {
          container.innerHTML = '<p class="empty">找不到这篇文章。</p>';
          document.title = "未找到";
          return;
        }

        document.title = `${post.title} · 个人博客`;
        container.innerHTML = `
          <header class="article-header">
            <div class="post-meta">
              <time datetime="${post.date}">${post.date}</time>
              <span class="post-tag">${post.tag}</span>
            </div>
            <h1>${post.title}</h1>
          </header>
          <div class="article-body">${renderPostContent(post)}</div>
        `;
      })
      .catch(() => {
        container.innerHTML = '<p class="empty">文章加载失败。</p>';
      });
  </script>
</body>
</html>
