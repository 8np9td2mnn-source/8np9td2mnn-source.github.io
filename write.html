<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>写文章（仅作者）</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./write.css">
</head>
<body>
  <div class="app write-app">
    <aside class="sidebar">
      <h1 class="site-name">作者后台</h1>
      <p class="site-desc">支持 Markdown，<br>发布后访客可见排版效果。</p>
      <nav class="nav">
        <a href="./index.html">查看网站</a>
      </nav>
      <p class="sidebar-foot">请勿分享此页面链接</p>
    </aside>

    <main class="main write-main">
      <section id="gate" class="panel gate" hidden>
        <h2 class="page-title">输入访问密码</h2>
        <p class="write-tip">已在本地配置访问密码，请输入后继续。</p>
        <label class="field">
          <span>密码</span>
          <input id="gate-password" type="password" autocomplete="current-password">
        </label>
        <button type="button" id="gate-submit" class="submit">进入</button>
        <p id="gate-error" class="toast error" hidden>密码错误</p>
      </section>

      <div id="workspace" hidden>
        <section class="panel setup">
          <h2 class="page-title">GitHub 发布设置</h2>
          <p class="write-tip">
            只需设置一次。Token 只保存在你电脑的浏览器里。
          </p>
          <label class="field">
            <span>仓库地址</span>
            <input id="repo" type="text" placeholder="8np9td2mnn-source/8np9td2mnn-source.github.io">
          </label>
          <label class="field">
            <span>GitHub Token</span>
            <input id="token" type="password" placeholder="ghp_ 开头" autocomplete="off">
          </label>
          <button type="button" id="save-settings" class="submit">保存设置</button>
          <p id="settings-toast" class="toast" hidden></p>
        </section>

        <section class="panel">
          <h2 class="page-title">写新文章</h2>
          <p class="write-tip md-hint">
            正文使用 <strong>Markdown</strong>。例如：<code># 标题</code>、<code>**粗体**</code>、<code>- 列表</code>。右侧可实时预览。
          </p>

          <form id="write-form" class="write-form">
            <div class="meta-fields">
              <label class="field">
                <span>标题</span>
                <input id="title" type="text" required>
              </label>
              <label class="field">
                <span>日期</span>
                <input id="date" type="date" required>
              </label>
              <label class="field">
                <span>标签</span>
                <input id="tag" type="text" value="随笔">
              </label>
              <label class="field field-wide">
                <span>摘要（列表页显示）</span>
                <input id="excerpt" type="text" required>
              </label>
            </div>

            <div class="editor-toolbar" role="toolbar" aria-label="Markdown 工具栏">
              <button type="button" class="tool-btn" data-action="h1" title="一级标题">H1</button>
              <button type="button" class="tool-btn" data-action="h2" title="二级标题">H2</button>
              <button type="button" class="tool-btn" data-action="bold" title="粗体">B</button>
              <button type="button" class="tool-btn" data-action="italic" title="斜体">I</button>
              <button type="button" class="tool-btn" data-action="quote" title="引用">引用</button>
              <button type="button" class="tool-btn" data-action="code" title="行内代码">代码</button>
              <button type="button" class="tool-btn" data-action="link" title="链接">链接</button>
              <button type="button" class="tool-btn" data-action="ul" title="无序列表">列表</button>
            </div>

            <div class="editor-layout">
              <label class="editor-pane">
                <span>正文（Markdown）</span>
                <textarea id="body" placeholder="## 小节标题&#10;&#10;在这里写正文，**支持粗体**、列表等。&#10;&#10;- 第一点&#10;- 第二点" required></textarea>
              </label>
              <div class="preview-pane">
                <span class="preview-label">实时预览</span>
                <div id="preview" class="article-body preview-body"></div>
              </div>
            </div>

            <div class="write-actions">
              <button type="submit" class="submit" id="publish-btn">发布到 GitHub（更新网站）</button>
            </div>
            <p id="publish-toast" class="toast" hidden></p>
          </form>
        </section>

        <section class="panel my-posts">
          <h3 class="panel-title">已发布文章</h3>
          <button type="button" id="refresh-posts" class="text-btn">刷新列表</button>
          <ul id="my-list"></ul>
          <p id="my-empty" class="empty">加载中…</p>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="./site.config.js"></script>
  <script src="config.local.js" onerror="void 0"></script>
  <script src="./blog-store.js"></script>
  <script src="./write.js"></script>
</body>
</html>
